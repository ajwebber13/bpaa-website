<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Beta Phi Alumni Association/title>

<!-- Bootstrap 5.2.3 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"/>

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<!-- Swiper -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet"/>

<style>

/* =========================
GLOBAL STYLES
========================= */

:root{
  --primary-gold:#c8a96b;
  --dark:#0f0f0f;
  --white:#ffffff;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Montserrat',sans-serif;
  background:var(--dark);
  color:var(--white);
  overflow-x:hidden;
}

h1,h2,h3,h4,h5{
  font-family:'Playfair Display',serif;
}

.section-padding{
  padding:100px 0;
}

/* =========================
TOP BAR
========================= */

.top-bar{
  background:#000;
  font-size:.9rem;
  border-bottom:1px solid rgba(255,255,255,.08);
}

.top-bar a{
  color:#fff;
  margin-left:15px;
}

/* =========================
NAVBAR
========================= */

.navbar{
  background:rgba(0,0,0,.75);
  backdrop-filter:blur(10px);
}

.navbar-brand{
  color:#fff !important;
  font-weight:700;
}

.nav-link{
  color:#fff !important;
  margin:0 10px;
}

.nav-link:hover{
  color:var(--primary-gold) !important;
}

.btn-gold{
  background:var(--primary-gold);
  color:#000;
  border-radius:50px;
  padding:10px 25px;
  font-weight:600;
}

/* =========================
HERO
========================= */

.hero{
  height:100vh;
}

.swiper,
.swiper-slide{
  height:100%;
}

.hero-slide{
  background-size:cover;
  background-position:center;
  position:relative;
}

.hero-slide::before{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.65);
}

.hero-content{
  position:relative;
  z-index:2;
  height:100%;
  display:flex;
  align-items:center;
}

.hero-content h1{
  font-size:3.5rem;
}

/* =========================
ABOUT
========================= */

.about-image img{
  width:100%;
  border-radius:15px;
}

/* =========================
STATS
========================= */

.stats{
  background:#141414;
}

.stat-box h2{
  color:var(--primary-gold);
}

/* =========================
LEADERSHIP
========================= */

.leader-card{
  background:#181818;
  border-radius:15px;
  overflow:hidden;
}

.leader-card img{
  width:100%;
  height:350px;
  object-fit:cover;
}

/* =========================
EVENTS
========================= */

.event-card{
  background:#181818;
  border-radius:15px;
  overflow:hidden;
}

.event-card img{
  width:100%;
  height:250px;
  object-fit:cover;
}

/* =========================
FOOTER
========================= */

footer{
  background:#000;
  padding:60px 0;
}

.footer-links a{
  display:block;
  color:#ccc;
  margin-bottom:8px;
}

.footer-links a:hover{
  color:var(--primary-gold);
}

.bottom-footer{
  border-top:1px solid rgba(255,255,255,.1);
  margin-top:40px;
  padding-top:20px;
  text-align:center;
  color:#888;
}

</style>
</head>
